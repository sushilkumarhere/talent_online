<html>
{% extends "cpanel/AdminBase.html" %}
{% load static %}
{% block mainblock %}
<!-- Page content -->

      <div class="col-md-12">
		<div class="card">
                            <div class="card-header">
                                <div class="d-flex align-items-center">
                                    <h4 class="card-title">Site Setting Home Page</h4>
                                     </div>
                            </div>
			    <div class="card-body">
					<div class="table-responsive">
                                <table id="example-datatable" class="table table-vcenter table-condensed table-bordered">
                                    <thead>
                                        <tr>
                                            <th class="text-center">ID</th>
                                            <th> logo</th>
                                            <th>Firm Name</th>
                                            <th>Mission</th>

                                            <th class="text-center">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
									   {% for ss in site_set1 %}
                                   		 <tr>
                                            <td class="text-center">{{ ss.id }}</td>
                                            <td class="text-center"><img src="{{ ss.FirmLogo.url }}"></td>
                                            <td>{{ ss.Firm }}</td>
                                            <td>{{ ss.main_slider_mission }}</td>
                                            <td class="text-center">
												<ul class="list-inline m-0">
													<li class="list-inline-item">
														 <a href="{% url 'UpdateSiteS' ss.id %}" class="btn btn-success btn-sm rounded-0" type="button" data-toggle="tooltip" data-placement="top" title="Edit"><i class="fa fa-edit"></i></a>
													</li>
													<li class="list-inline-item">
														<a href="{% url 'DeleteSiteS' ss.id %}" class="btn btn-danger btn-sm rounded-0" type="button" data-toggle="tooltip" data-placement="top" title="Delete"><i class="fa fa-trash"></i></a>
													</li>
												</ul>
                                            </td>
										 </tr>
									   {% endfor %}
                                    </tbody>
                                </table>
					</div>
				</div>
		</div>
	  </div>

{% endblock %}
</html>
