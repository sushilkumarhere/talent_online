{% extends "cpanel/AdminBase.html" %}
{% load widget_tweaks %}
{% load static %}
{% block mainblock %}
<html>
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body style="background-color:#4DB6AC;">
<div class="col-md-12">
		<div class="card">
                            <div class="card-header">
                                <div class="d-flex align-items-center">
                                    <h4 class="card-title">Our Services</h4>
                                    <a href="{% url 'CourseCreate' %}" class="btn btn-primary btn-round ml-auto" type="button" data-toggle="tooltip"
                                        data-placement="top" title="Add Services"><i class="fa fa-plus"></i>Add New Course</a>
                                </div>
                            </div>
			    <div class="card-body">


                    <div class="card-deck">
                        {% for book in cr %}
                                <div class="card" style="width: 18rem;">
                                      <img class="card-img-top" src="{{ book.CourseImage.url }}">
                                    <div class="card-body">
                                        <h1 class="card-title">{{ book.CourseName }}</h1>

                                        <p class="card-text">{{ book.CourseDetail }}</p>
                                        <div class="card-footer bg-transparent border-dark">
                                           <h2 class="card-title">{{book.Eligibility}} </h2>
                                                <center>
                                                   <a href="{% url 'CourseUpdate' book.id %}" class="btn btn-warning" id = '{{book.id}}'>edit</a>
                                                   <a href="{% url 'CourseDelete' book.id %}" class="btn btn-danger" id = '{{book.id}}'>delete</a>
                                                </center>
                                        </div>
                                    </div>
                                </div>
                        {% endfor %}
                    </div>
                </div>
        </div>
</div>
 {% endblock %}
</body>
</html>
